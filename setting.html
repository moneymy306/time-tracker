<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตั้งค่า · TIME/TRACK</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <nav id="app-nav"></nav>
    <main>
      <div class="page-header">
        <h1 class="page-title">ตั้งค่า</h1>
        <p class="page-subtitle">กำหนดเวลาทำงาน สิทธิ์วันลา และกฎการคำนวณ OT</p>
      </div>

      <div class="card">
        <div class="card-title">เวลาทำงาน</div>
        <div class="field-row">
          <div class="field">
            <label>เวลาเข้างาน</label>
            <input type="time" id="set-work-start">
          </div>
          <div class="field">
            <label>เวลาเลิกงาน</label>
            <input type="time" id="set-work-end">
          </div>
          <div class="field">
            <label>เวลาพัก (นาที)</label>
            <input type="number" id="set-break-minutes" min="0" step="5">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">สิทธิ์วันลาต่อปี</div>
        <p class="page-subtitle" style="margin-top:-8px">กำหนดสิทธิ์เป็นวัน/ชั่วโมง/นาที รวมกันได้ เช่น 6 วัน 4 ชม. 30 นาที</p>
        <div class="field-row">
          <div class="field">
            <label>พักร้อน</label>
            <div class="quota-dhm">
              <input type="number" id="set-quota-vacation-days" min="0" placeholder="วัน">
              <input type="number" id="set-quota-vacation-hours" min="0" max="23" placeholder="ชม.">
              <input type="number" id="set-quota-vacation-minutes" min="0" max="59" placeholder="นาที">
            </div>
          </div>
          <div class="field">
            <label>ลากิจ</label>
            <div class="quota-dhm">
              <input type="number" id="set-quota-personal-days" min="0" placeholder="วัน">
              <input type="number" id="set-quota-personal-hours" min="0" max="23" placeholder="ชม.">
              <input type="number" id="set-quota-personal-minutes" min="0" max="59" placeholder="นาที">
            </div>
          </div>
          <div class="field">
            <label>ลาป่วย</label>
            <div class="quota-dhm">
              <input type="number" id="set-quota-sick-days" min="0" placeholder="วัน">
              <input type="number" id="set-quota-sick-hours" min="0" max="23" placeholder="ชม.">
              <input type="number" id="set-quota-sick-minutes" min="0" max="59" placeholder="นาที">
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">กฎการคำนวณ OT อัตโนมัติ</div>
        <div class="field-row">
          <div class="field">
            <label>นับ OT ขั้นต่ำ (นาทีที่เกินมา)</label>
            <input type="number" id="set-ot-min" min="0" step="5">
          </div>
          <div class="field">
            <label>ปัดเศษ OT ลง (นาที)</label>
            <input type="number" id="set-ot-round" min="1" step="5">
          </div>
          <div class="field">
            <label>OT หมดอายุหลังจาก (วัน)</label>
            <input type="number" id="set-ot-expire" min="1">
          </div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="saveSettingsForm()">บันทึกการตั้งค่า</button>
      <button class="btn btn-outline" onclick="resetSettingsForm()">คืนค่าเริ่มต้น</button>
    </main>
  </div>

  <script src="storage.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    function loadSettingsForm() {
      const s = getSettings();
      document.getElementById('set-work-start').value = s.workStart;
      document.getElementById('set-work-end').value = s.workEnd;
      document.getElementById('set-break-minutes').value = s.breakMinutes;
      ['vacation', 'personal', 'sick'].forEach(type => {
        document.getElementById(`set-quota-${type}-days`).value = s.leaveQuota[type].days;
        document.getElementById(`set-quota-${type}-hours`).value = s.leaveQuota[type].hours;
        document.getElementById(`set-quota-${type}-minutes`).value = s.leaveQuota[type].minutes;
      });
      document.getElementById('set-ot-min').value = s.otRule.minMinutesToCount;
      document.getElementById('set-ot-round').value = s.otRule.roundToMinutes;
      document.getElementById('set-ot-expire').value = s.otRule.expireDays;
    }

    function saveSettingsForm() {
      const readQuota = type => ({
        days: parseInt(document.getElementById(`set-quota-${type}-days`).value, 10) || 0,
        hours: parseInt(document.getElementById(`set-quota-${type}-hours`).value, 10) || 0,
        minutes: parseInt(document.getElementById(`set-quota-${type}-minutes`).value, 10) || 0
      });
      const newSettings = {
        workStart: document.getElementById('set-work-start').value,
        workEnd: document.getElementById('set-work-end').value,
        breakMinutes: parseInt(document.getElementById('set-break-minutes').value, 10) || 0,
        workDays: DEFAULT_SETTINGS.workDays,
        leaveQuota: {
          vacation: readQuota('vacation'),
          personal: readQuota('personal'),
          sick: readQuota('sick')
        },
        otRule: {
          minMinutesToCount: parseInt(document.getElementById('set-ot-min').value, 10) || 0,
          roundToMinutes: parseInt(document.getElementById('set-ot-round').value, 10) || 1,
          expireDays: parseInt(document.getElementById('set-ot-expire').value, 10) || 90
        }
      };
      Storage.saveSettings(newSettings);
      toast('บันทึกการตั้งค่าแล้ว');
    }

    function resetSettingsForm() {
      if (!confirmDialog('คืนค่าเริ่มต้นทั้งหมด?')) return;
      Storage.saveSettings(null);
      loadSettingsForm();
      toast('คืนค่าเริ่มต้นแล้ว');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderShell('setting.html');
      loadSettingsForm();
    });
  </script>
</body>
</html>
