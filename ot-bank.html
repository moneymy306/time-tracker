<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OT คงเหลือ · TIME/TRACK</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <nav id="app-nav"></nav>
    <main>
      <div class="page-header">
        <h1 class="page-title">OT คงเหลือ</h1>
        <p class="page-subtitle">เวลาที่ทำงานเกินมาจะถูกสะสมไว้ที่นี่โดยอัตโนมัติ นำมาเบิกใช้ภายหลังได้</p>
      </div>

      <div class="card">
        <div class="ot-balance-box">
          <div class="ot-balance-value" id="ot-balance-display">0h 00m</div>
          <div class="ot-balance-caption">OT คงเหลือ (ไม่รวมรายการที่หมดอายุ)</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">เบิกใช้ OT</div>
        <div class="field-row">
          <div class="field">
            <label>วันที่</label>
            <input type="date" id="ot-use-date">
          </div>
          <div class="field">
            <label>จำนวนนาที</label>
            <input type="number" id="ot-use-minutes" min="1" step="1" placeholder="เช่น 60">
          </div>
          <div class="field" style="flex:2">
            <label>หมายเหตุ</label>
            <input type="text" id="ot-use-note" placeholder="เช่น ลาออกก่อนครึ่งวัน">
          </div>
        </div>
        <button class="btn btn-accent" onclick="useOT()">เบิกใช้ OT</button>
      </div>

      <div class="card">
        <div class="card-title">ประวัติ OT</div>
        <table>
          <thead>
            <tr><th>วันที่</th><th>ประเภท</th><th>จำนวน</th><th>หมายเหตุ</th><th></th></tr>
          </thead>
          <tbody id="ot-ledger-body"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ot.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => renderShell('ot-bank.html'));
  </script>
</body>
</html>
