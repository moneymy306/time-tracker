<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงาน · TIME/TRACK</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <nav id="app-nav"></nav>
    <main>
      <div class="page-header">
        <h1 class="page-title">รายงานสรุป</h1>
        <p class="page-subtitle">เลือกเดือนเพื่อดูสรุปการทำงาน วันลา และ OT</p>
      </div>

      <div class="card">
        <div class="card-title">
          เลือกเดือน
          <input type="month" id="report-month">
        </div>
        <div class="report-cards" id="report-cards"></div>
      </div>

      <div class="card">
        <div class="card-title">แยกตามประเภทวันลา</div>
        <table>
          <thead><tr><th>ประเภท</th><th>จำนวนวัน</th></tr></thead>
          <tbody id="report-leave-breakdown"></tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-title">รายวันในเดือนนี้</div>
        <table>
          <thead><tr><th>วันที่</th><th>สถานะ</th></tr></thead>
          <tbody id="report-daily-body"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="storage.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="report.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => renderShell('report.html'));
  </script>
</body>
</html>
