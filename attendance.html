<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลงเวลา · TIME/TRACK</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <nav id="app-nav"></nav>
    <main>
      <div class="page-header">
        <h1 class="page-title">ลงเวลาเข้า-ออกงาน</h1>
        <p class="page-subtitle">ระบบจะคำนวณ OT ให้อัตโนมัติเมื่อลงเวลาออกเกินเวลาเลิกงานที่ตั้งไว้</p>
      </div>

      <div class="card">
        <div class="card-title">
          วันนี้
          <span id="today-status"></span>
        </div>
        <div class="clock-actions">
          <button class="btn btn-primary" id="btn-clockin" onclick="clockIn()">ลงเวลาเข้างาน</button>
          <button class="btn btn-outline" id="btn-clockout" onclick="clockOut()">ลงเวลาออกงาน</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">ลงเวลาย้อนหลัง</div>
        <p class="page-subtitle" style="margin-top:-8px">ลืมลงเวลา? เพิ่มหรือแก้ไขเวลาเข้า-ออกของวันที่ผ่านมาได้ที่นี่ (ถ้าวันนั้นมีข้อมูลอยู่แล้วจะเขียนทับ)</p>
        <div class="field-row">
          <div class="field">
            <label>วันที่</label>
            <input type="date" id="back-date">
          </div>
          <div class="field">
            <label>เวลาเข้างาน</label>
            <input type="time" id="back-timein">
          </div>
          <div class="field">
            <label>เวลาออกงาน (ถ้ามี)</label>
            <input type="time" id="back-timeout">
          </div>
        </div>
        <div class="field">
          <label>หมายเหตุ (ไม่บังคับ)</label>
          <input type="text" id="back-note" placeholder="เช่น ลืมแตะบัตร, ทำงานนอกสถานที่">
        </div>
        <button class="btn btn-primary" onclick="addBackdatedAttendance()">บันทึกลงเวลาย้อนหลัง</button>
      </div>

      <div class="card">
        <div class="card-title">
          ประวัติย้อนหลัง
          <input type="month" id="history-month-filter">
        </div>
        <table>
          <thead>
            <tr><th>วันที่</th><th>เข้างาน</th><th>ออกงาน</th><th>ชั่วโมงทำงาน</th><th></th></tr>
          </thead>
          <tbody id="attendance-history-body"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="storage.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="attendance.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => renderShell('attendance.html'));
  </script>
</body>
</html>
